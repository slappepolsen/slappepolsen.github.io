<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose a design — SP Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #df4300; --orange: #f48a32; --light-orange: #ffab68;
      --pink: #dc7bb3; --purple: #c46ea1; --dark-pink: #b42075;
      --bg: #1a1918; --text: #e8e6e3; --muted: #a8a6a3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 3rem 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; max-width: 900px; }
    a { display: block; padding: 1.25rem; background: rgba(220,123,179,0.1); border: 1px solid rgba(220,123,179,0.3); border-radius: 8px; color: var(--pink); text-decoration: none; font-weight: 600; transition: all 0.2s; }
    a:hover { background: rgba(220,123,179,0.2); border-color: var(--pink); transform: translateY(-2px); }
    a span { display: block; font-size: 0.8rem; font-weight: 400; color: var(--muted); margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Choose a design</h1>
  <p>Same content, different vibes. Pick one to preview.</p>
  <div class="grid">
    <a href="index.html">Original<span>Current default — cards, gradient header</span></a>
    <a href="index.html?design=retro">Retro<span>Warm, rounded, nostalgic</span></a>
    <a href="index.html?design=brutalist">Brutalist · Warm light<span>Light — cream bg, soft brutalist</span></a>
  </div>
</body>
</html>
